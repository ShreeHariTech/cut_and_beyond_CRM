{% extends 'base.html' %}
{% block content %}

<div class="container-fluid">

    <div class="mb-4">
        <h5 class="fw-semibold mb-1">Edit Employee</h5>
        <small class="text-muted">Update employee details</small>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card border">
                <div class="card-header bg-light fw-semibold">
                    Employee Details
                </div>

                <div class="card-body">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Employee Name</label>
                            <input type="text"
                                   name="name"
                                   value="{{ employee.name }}"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mobile Number</label>
                            <input type="text"
                                   name="mobile"
                                   value="{{ employee.mobile }}"
                                   class="form-control"
                                   maxlength="10"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Birth Date</label>
                            <input type="date"
                                   name="birth_date"
                                   value="{{ employee.birth_date|date:'Y-m-d' }}"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary">
                                Update
                            </button>
                            <a href="{% url 'add_employee' %}"
                               class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
