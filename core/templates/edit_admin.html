{% extends 'base.html' %}
{% block content %}

<div class="container-fluid">

    <!-- PAGE TITLE -->
    <div class="mb-4">
        <h5 class="fw-semibold mb-1">Edit Admin</h5>
        <small class="text-muted">Update administrator details</small>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-5 col-sm-10">

            <div class="card border">
                <div class="card-header bg-light fw-semibold">
                    Admin Details
                </div>

                <div class="card-body">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Mobile Number</label>
                            <input type="text"
                                   name="mobile"
                                   value="{{ admin.mobile }}"
                                   class="form-control"
                                   maxlength="10"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                New Password <span class="text-muted">(optional)</span>
                            </label>
                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Leave blank to keep current password">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                Update
                            </button>

                            <a href="{% url 'add_admin' %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
