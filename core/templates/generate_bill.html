{% extends 'base.html' %}
{% block content %}

<h5 class="mb-3">Generate Bill</h5>

<div class="card border p-3">

<!-- CUSTOMER -->
<label>Name</label>
<div class="position-relative">
    <input type="text" id="name" class="form-control" autocomplete="off"
           onkeyup="searchCustomer(this.value)">

    <div id="customerList"
         class="list-group position-absolute w-100"
         style="z-index:1000; display:none;">
    </div>
</div>


<label class="mt-2">Mobile</label>
<input type="text" id="mobile" class="form-control">

<!-- SERVICES -->
<table class="table mt-3" id="billTable">
<thead>
<tr>
<th>Service</th>
<th>Employee</th>
<th>Original Price (₹)</th>
<th>Final Price (₹)</th>
<th>Discount (₹)</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>

<button class="btn btn-sm btn-secondary" onclick="addRow()">+ Add Service</button>

<label class="mt-2">Package Balance</label>
<input type="text" id="package_balance"
       class="form-control"
       readonly>

<h5 class="mt-3">
    Total: ₹ <span id="total">0</span>
    <span id="discountSummary" class="text-warning small ms-2" style="display:none;">
        (Discount: ₹ <span id="totalDiscount">0</span>)
    </span>
</h5>

<select id="payment" class="form-select mt-2" onchange="checkPackage()">
<option value="cash">Cash</option>
<option value="online">Online</option>
<option value="package">Package</option>
</select>

<button class="btn btn-primary mt-3" onclick="saveBill()">Generate</button>

</div>

<script>
let total = 0;

function addRow() {
    let row = document.createElement('tr');
    row.innerHTML = `
    <td>
        <select class="form-select service" onchange="updatePrice(this)">
            <option value="">Select</option>
            {% for s in services %}
            <option value="{{ s.id }}" data-price="{{ s.price }}">{{ s.name }} (₹{{ s.price }})</option>
            {% endfor %}
        </select>
    </td>
    <td>
        <select class="form-select employee">
            {% for e in employees %}
            <option value="{{ e.id }}">{{ e.name }}</option>
            {% endfor %}
        </select>
    </td>
    <td class="original-price text-muted">0</td>
    <td>
        <input type="number" class="form-control final-price" value="0" min="0" step="0.01"
               oninput="recalcRow(this); calcTotal();">
    </td>
    <td class="discount text-warning fw-semibold">0</td>
    <td>
        <button class="btn btn-sm btn-danger"
            onclick="this.closest('tr').remove(); calcTotal()">
            ×
        </button>
    </td>
    `;
    document.querySelector('#billTable tbody').appendChild(row);
}

function updatePrice(sel) {
    let price = parseFloat(sel.options[sel.selectedIndex].dataset.price) || 0;
    let row = sel.closest('tr');
    row.querySelector('.original-price').innerText = price;
    row.querySelector('.final-price').value = price;
    row.querySelector('.discount').innerText = 0;
    calcTotal();
}

function recalcRow(input) {
    let row = input.closest('tr');
    let orig = parseFloat(row.querySelector('.original-price').innerText) || 0;
    let final = parseFloat(input.value) || 0;
    let disc = orig > final ? (orig - final).toFixed(2) : 0;
    row.querySelector('.discount').innerText = disc;
}

function calcTotal() {
    total = 0;
    let totalDiscount = 0;
    document.querySelectorAll('#billTable tbody tr').forEach(tr => {
        let fp = parseFloat(tr.querySelector('.final-price').value) || 0;
        let disc = parseFloat(tr.querySelector('.discount').innerText) || 0;
        total += fp;
        totalDiscount += disc;
    });
    document.getElementById('total').innerText = total.toFixed(2);

    const discSummary = document.getElementById('discountSummary');
    if (totalDiscount > 0) {
        document.getElementById('totalDiscount').innerText = totalDiscount.toFixed(2);
        discSummary.style.display = 'inline';
    } else {
        discSummary.style.display = 'none';
    }
}

function clearForm() {
    document.getElementById('name').value = '';
    document.getElementById('mobile').value = '';
    document.getElementById('package_balance').value = '';
    document.querySelector('#billTable tbody').innerHTML = '';
    total = 0;
    document.getElementById('total').innerText = '0';
    document.getElementById('discountSummary').style.display = 'none';
}

function saveBill() {
    let items = [];
    let valid = true;
    document.querySelectorAll('#billTable tbody tr').forEach(tr => {
        const serviceId = tr.querySelector('.service').value;
        if (!serviceId) { valid = false; return; }
        items.push({
            service: serviceId,
            employee: tr.querySelector('.employee').value,
            original_price: tr.querySelector('.original-price').innerText,
            price: tr.querySelector('.final-price').value
        });
    });

    if (!valid) {
        alert('Please select a service for every row.');
        return;
    }

    if (items.length === 0) {
        alert('Please add at least one service.');
        return;
    }

    fetch('/generate-bill/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({
            name: document.getElementById('name').value,
            mobile: document.getElementById('mobile').value,
            payment_mode: document.getElementById('payment').value,
            total: total,
            items: items
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === 'error') {
            alert(data.message);
            return;
        }

        alert('Bill generated successfully');

        // update package balance if used
        if (document.getElementById('payment').value === 'package') {
            document.getElementById('package_balance').value =
                data.remaining_package;
        }

        clearForm();
    });

}

function searchCustomer(query) {
    const list = document.getElementById('customerList');

    if (query.length < 1) {
        list.style.display = 'none';
        return;
    }

    fetch(`/customer-search/?q=${query}`)
        .then(res => res.json())
        .then(data => {

            list.innerHTML = '';

            if (data.length === 0) {
                list.style.display = 'none';
                return;
            }

            data.forEach(c => {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = 'list-group-item list-group-item-action';
                item.innerText = `${c.name} (${c.mobile})`;

                item.onclick = () => {
                    document.getElementById('name').value = c.name;
                    document.getElementById('mobile').value = c.mobile;
                    document.getElementById('package_balance').value = c.package;
                    list.style.display = 'none';
                };

                list.appendChild(item);
            });

            list.style.display = 'block';
        });
}

function checkPackage() {
    const mode = document.getElementById('payment').value;
    const pkg = Number(document.getElementById('package_balance').value || 0);

    if (mode === 'package' && pkg <= 0) {
        alert('This customer has no package balance');
        document.getElementById('payment').value = 'cash';
    }
}

</script>


{% endblock %}
