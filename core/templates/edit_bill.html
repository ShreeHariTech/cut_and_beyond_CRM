{% extends 'base.html' %}
{% block content %}

<h5 class="mb-3">Edit Bill</h5>

<form method="POST">
{% csrf_token %}

<table class="table table-bordered" id="editBillTable">
    <thead>
        <tr>
            <th>Service</th>
            <th>Employee</th>
            <th>Original Price (₹)</th>
            <th>Final Price (₹)</th>
            <th>Discount (₹)</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="rows">

{% for item in bill.items.all %}
<tr>
    <td>
        <select name="service" class="form-select service-sel" onchange="updateOriginalPrice(this)">
            {% for s in services %}
            <option value="{{ s.id }}"
                    data-price="{{ s.price }}"
                    {% if s.id == item.service.id %}selected{% endif %}>
                {{ s.name }} (₹{{ s.price }})
            </option>
            {% endfor %}
        </select>
    </td>

    <td>
        <select name="employee" class="form-select">
            {% for e in employees %}
            <option value="{{ e.id }}"
                {% if e.id == item.employee.id %}selected{% endif %}>
                {{ e.name }}
            </option>
            {% endfor %}
        </select>
    </td>

    <td class="original-price text-muted">{{ item.original_price }}</td>

    <td>
        <input type="number" name="price" step="0.01" min="0"
               class="form-control final-price"
               value="{{ item.price }}"
               oninput="recalcRow(this)">
    </td>

    <td class="discount-cell text-warning fw-semibold">{{ item.discount }}</td>

    <td>
        <button type="button"
                class="btn btn-sm btn-outline-danger"
                onclick="removeRow(this)">
            Remove
        </button>
    </td>
</tr>
{% endfor %}

    </tbody>

</table>

<div class="mb-3">
    <label>Payment Mode</label>
    <select name="payment_mode" class="form-select">
        <option value="cash" {% if bill.payment_mode == 'cash' %}selected{% endif %}>Cash</option>
        <option value="online" {% if bill.payment_mode == 'online' %}selected{% endif %}>Online</option>
        <option value="package" {% if bill.payment_mode == 'package' %}selected{% endif %}>Package</option>
    </select>
</div>

<div class="d-flex gap-2">
    <button class="btn btn-primary">Update Bill</button>
    <a href="{% url 'client_detail' bill.customer.id %}"
       class="btn btn-outline-secondary">Cancel</a>
</div>

</form>

<script>
function removeRow(btn) {
    btn.closest('tr').remove();
}

function updateOriginalPrice(sel) {
    let price = parseFloat(sel.options[sel.selectedIndex].dataset.price) || 0;
    let row = sel.closest('tr');
    row.querySelector('.original-price').innerText = price;
    // Auto-fill final price only if user hasn't customised it yet
    let finalInput = row.querySelector('.final-price');
    finalInput.value = price;
    recalcRow(finalInput);
}

function recalcRow(input) {
    let row = input.closest('tr');
    let orig = parseFloat(row.querySelector('.original-price').innerText) || 0;
    let final = parseFloat(input.value) || 0;
    let disc = orig > final ? (orig - final).toFixed(2) : 0;
    row.querySelector('.discount-cell').innerText = disc;
}

// Initialise discount cells on page load
document.querySelectorAll('#editBillTable tbody tr').forEach(row => {
    let orig = parseFloat(row.querySelector('.original-price').innerText) || 0;
    let final = parseFloat(row.querySelector('.final-price').value) || 0;
    let disc = orig > final ? (orig - final).toFixed(2) : 0;
    row.querySelector('.discount-cell').innerText = disc;
});
</script>


{% endblock %}
