{% extends 'base.html' %}
{% block content %}

<h5 class="mb-3">Edit Service</h5>

<div class="card border p-3" style="max-width:500px;">

    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} py-2">{{ message }}</div>
    {% endfor %}

    <form method="POST" class="row g-3">
        {% csrf_token %}

        <div class="col-12">
            <label class="form-label">Service Name</label>
            <input type="text"
                   name="name"
                   value="{{ service.name }}"
                   class="form-control"
                   required>
        </div>

        <div class="col-12">
            <label class="form-label">Price (₹)</label>
            <input type="number"
                   step="0.01"
                   name="price"
                   value="{{ service.price }}"
                   class="form-control"
                   required>
        </div>

        {% if request.user.is_super_admin %}
        <div class="col-12">
            <label class="form-label">Branch</label>
            <select name="branch" class="form-select">
                <option value="">— All Branches (Global) —</option>
                {% for branch in branches %}
                <option value="{{ branch.id }}"
                    {% if service.branch and service.branch.id == branch.id %}selected{% endif %}>
                    {{ branch.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        {% else %}
        <div class="col-12">
            <small class="text-muted">
                Branch: <strong>{{ service.branch.name|default:"Global" }}</strong>
            </small>
        </div>
        {% endif %}

        <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary">Update Service</button>
            <a href="{% url 'service' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>

</div>

{% endblock %}
