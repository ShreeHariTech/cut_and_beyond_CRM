{% extends 'base.html' %}
{% block content %}

<div class="container-fluid">

    <div class="mb-4">
        <h5 class="fw-semibold mb-1">Edit Service</h5>
        <small class="text-muted">Update service details</small>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card border">
                <div class="card-header bg-light fw-semibold">
                    Service Details
                </div>

                <div class="card-body">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Service Name</label>
                            <input type="text"
                                   name="name"
                                   value="{{ service.name }}"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price (₹)</label>
                            <input type="number"
                                   step="0.01"
                                   name="price"
                                   value="{{ service.price }}"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary">
                                Update
                            </button>
                            <a href="{% url 'service' %}"
                               class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
