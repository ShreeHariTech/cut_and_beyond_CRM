<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRM Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: linear-gradient(180deg, #111827, #1f2937);
        }

        .sidebar .nav-link {
            color: #cbd5e1;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 6px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .sidebar .nav-link:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .sidebar .nav-link.active {
            background: #0d6efd;
            color: #fff;
        }

        .brand {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                z-index: 1040;
                left: -260px;
                transition: left 0.3s ease;
            }
            .sidebar.show {
                left: 0;
            }
            .overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.4);
                z-index: 1039;
            }
            .overlay.show {
                display: block;
            }
        }
    </style>
</head>

<body>

<!-- Mobile Overlay -->
<div id="overlay" class="overlay"></div>

<div class="d-flex">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar p-3">
        <div class="d-flex align-items-center mb-4">
            <i class="bi bi-grid-fill text-primary fs-4 me-2"></i>
            <span class="brand text-white">CRM Panel</span>
        </div>

        <ul class="nav flex-column">
            <li>
                <a href="/dashboard/"
   class="nav-link {% if request.path == '/dashboard/' %}active{% endif %}">
    <i class="bi bi-speedometer2 me-2"></i> Dashboard
</a>

            </li>
            <li>
                <a href="/clients/"
   class="nav-link {% if request.path == '/clients/' %}active{% endif %}">
    <i class="bi bi-people me-2"></i> Clients
</a>

            </li>
            <li>
                <a href="/generate-bill/"
   class="nav-link {% if request.path == '/generate-bill/' %}active{% endif %}">
    <i class="bi bi-receipt me-2"></i> Generate Bill
</a>

            </li>
            <li>
                <a href="/add-employee/"
   class="nav-link {% if request.path == '/add-employee/' %}active{% endif %}">
    <i class="bi bi-person-plus me-2"></i> Add Employee
</a>

            </li>
            <li>
                <a href="/add-admin/"
   class="nav-link {% if '/add-admin/' in request.path or '/edit-admin/' in request.path %}active{% endif %}">
    <i class="bi bi-shield-lock me-2"></i> Add Admin
</a>

            </li>

            <li>
    <a href="/service/"
       class="nav-link {% if '/service/' in request.path %}active{% endif %}">
        <i class="bi bi-gear me-2"></i> Services
    </a>
</li>

            <hr class="text-secondary my-3">

            <li>
                <a href="/logout/" class="nav-link text-danger">
    <i class="bi bi-box-arrow-right me-2"></i> Logout
</a>

            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <div class="flex-grow-1">

        <!-- Top Navbar -->
        <nav class="navbar navbar-light bg-white shadow-sm px-3">
            <button class="btn btn-outline-primary d-md-none" id="menuBtn">
                <i class="bi bi-list"></i>
            </button>
            <span class="ms-2 fw-semibold">Welcome to CRM</span>
        </nav>

        <!-- Page Content -->
        <main class="p-4">
            {% block content %}{% endblock %}
        </main>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuBtn = document.getElementById('menuBtn');

    menuBtn.addEventListener('click', () => {
        sidebar.classList.toggle('show');
        overlay.classList.toggle('show');
    });

    overlay.addEventListener('click', () => {
        sidebar.classList.remove('show');
        overlay.classList.remove('show');
    });
</script>

</body>
</html>
