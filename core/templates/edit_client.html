{% extends 'base.html' %}
{% block content %}

<h5 class="mb-3">Edit Client</h5>

<div class="card border">
    <div class="card-body">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Name</label>
                <input type="text"
                       name="name"
                       value="{{ customer.name }}"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Mobile</label>
                <input type="text"
                       name="mobile"
                       value="{{ customer.mobile }}"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Package Balance</label>
                <input type="number"
                       step="0.01"
                       name="package_amount"
                       value="{{ customer.package_amount }}"
                       class="form-control">
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-primary">
                    Update
                </button>
                <a href="{% url 'client_list' %}"
                   class="btn btn-outline-secondary">
                    Cancel
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
